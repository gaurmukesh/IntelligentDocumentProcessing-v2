# App
spring.application.name=idp-erp
server.port=8080

# H2 Database (local dev)
spring.datasource.url=jdbc:h2:mem:idpdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (local dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# FastAPI AI Service URL
ai.service.base-url=http://localhost:8000

# Logging
logging.level.com.idp=DEBUG
