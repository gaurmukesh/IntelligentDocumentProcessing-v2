events {
    worker_connections 1024;
}

http {
    client_max_body_size 20M;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — FastAPI (API) ─────────────────────────────────────────────────
    # NOTE: On Lightsail Container Service, SSL is handled automatically.
    # This config is only used when self-hosting behind Nginx (docker-compose.prod.yml).
    server {
        listen 443 ssl;
        server_name api.yourdomain.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        location / {
            proxy_pass         http://fastapi:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # ── HTTPS — React Frontend ────────────────────────────────────────────────
    # NOTE: On Lightsail, React is hosted on Object Storage (static website).
    # This is only needed for self-hosted / docker-compose.prod.yml testing.
    server {
        listen 443 ssl;
        server_name app.yourdomain.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        location / {
            proxy_pass         http://frontend:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }
    }
}
